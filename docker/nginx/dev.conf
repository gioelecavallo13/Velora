# Configurazione nginx per ambiente di SVILUPPO.
# Risponde sul virtual host velora.local e fa da reverse proxy al container `web` (Django runserver).
# Vedi docs/INFRASTRUCTURE.md per la voce da aggiungere a /etc/hosts.

upstream velora_web {
    server web:8000;
}

server {
    listen 80;
    server_name velora.local localhost;

    client_max_body_size 25m;

    location / {
        proxy_pass http://velora_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400;
    }
}
