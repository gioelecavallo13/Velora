# Configurazione nginx per ambiente di PRODUZIONE.
#
# Differenze chiave rispetto a dev.conf:
#  - server_name dinamico via env (NGINX_SERVER_NAME, default `_`)
#  - serve direttamente /static/ e /media/ da volumi condivisi (no proxy)
#  - gzip on per asset testuali
#  - header di sicurezza (HSTS preparato ma commentato finche` TLS off)
#  - blocco TLS placeholder pronto per certificati (Let's Encrypt / ACM)
#  - rate limit base sull'API
#
# Variabili sostituite a runtime via `envsubst` da entrypoint nginx
# (vedi docker-compose.prod.yml: il comando del servizio nginx fa
# `envsubst < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf`).
# Per semplicita` di v0.1 NON usiamo template: `server_name _;` accetta
# qualsiasi host e l'allowlist e` delegata a Django (DJANGO_ALLOWED_HOSTS).
# Quando avremo un dominio fisso, sostituire `_` con il nome reale.

# hostname `web` clashes with other stacks on shared Docker nets (DNS → wrong IP).
# docker-compose.prod.yml usa container_name: velora-web-prod per un upstream univoco.
upstream velora_web {
    server velora-web-prod:8000;
    keepalive 32;
}

# Traefik termina TLS verso il cliente e parla HTTP con nginx. Quando Traefik invia
# X-Forwarded-Proto: https, non riscriverlo con $scheme (su :80 e` sempre http)
# altrimenti Django vede richieste HTTP e (con SECURE_PROXY_SSL_HEADER) comportamenti strani.
map $http_x_forwarded_proto $velora_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Rate limit zone: 10 richieste/sec con burst 20 sull'IP del client.
# Applicato solo alla locazione root, esclude /static/ e /media/ che
# vengono serviti da nginx senza toccare l'app.
limit_req_zone $binary_remote_addr zone=velora_rl:10m rate=10r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Header di sicurezza base.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS: abilitarlo SOLO dopo che TLS e` attivo end-to-end, altrimenti
    # i browser restano legati al pin HTTPS senza certificato funzionante.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # File statici raccolti da `manage.py collectstatic`. Cache lunga: gli
    # asset Velora hanno cache busting nel filename (post-esbuild + django
    # ManifestStaticFilesStorage in v0.2 -- per ora il busting e` solo per
    # contenuto del bundle quindi 1h e` sicuro).
    location /static/ {
        alias /var/www/velora/static/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # File media (upload utente). NON cache lunga di default.
    location /media/ {
        alias /var/www/velora/media/;
        access_log off;
        expires 5m;
    }

    # Health endpoint diretto su gunicorn (non usato da v0.1, predisposto).
    location = /healthz {
        proxy_pass http://velora_web/healthz;
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Proto  $velora_forwarded_proto;
        access_log off;
    }

    location / {
        limit_req zone=velora_rl burst=20 nodelay;

        proxy_pass http://velora_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $velora_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}

