# Opzionale: espone nginx sulla macchina host (es. localhost:8081 -> :80 nel container).
# Utile per test prod senza Traefik. Uso:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml -f docker-compose.host-nginx-port.yml up -d

services:
  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
