name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install --upgrade pip && pip install ".[dev]"

      - name: ui_registry sync (--check)
        run: python tools/sync_ui_registry.py --check

      - name: pytest
        run: pytest -q
