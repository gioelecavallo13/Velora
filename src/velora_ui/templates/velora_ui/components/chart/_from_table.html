{% comment %}
  Chart.js da tabella HTML. Il componente JS chart-from-table trova la tabella,
  estrae dati e disegna sul canvas.
{% endcomment %}
<div class="velora-chart {{ extra_class }}"
     data-velora-component="chart-from-table"
     data-table-selector="{{ table_selector }}"
     data-chart-type="{{ chart_type }}"
     style="height: {{ height_px }}px; position: relative;">
    <canvas id="{{ canvas_id }}" aria-label="Grafico da tabella" role="img"></canvas>
</div>
