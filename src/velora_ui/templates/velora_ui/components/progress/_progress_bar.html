{% comment %}
  Progress bar classica (10.10). Mostra label + percentuale + barra.
{% endcomment %}
<div class="velora-progress velora-progress--{{ variant }} {{ extra_class }}"
     role="progressbar"
     aria-valuenow="{{ pct_int }}"
     aria-valuemin="0"
     aria-valuemax="100"
     {% if label %}aria-label="{{ label }}"{% endif %}>
    {% if label or show_percent %}
    <div class="velora-progress__header">
        {% if label %}<span class="velora-progress__label">{{ label }}</span>{% endif %}
        {% if show_percent %}<span class="velora-progress__percent">{{ pct_int }}%</span>{% endif %}
    </div>
    {% endif %}
    <div class="velora-progress__track">
        <div class="velora-progress__fill" style="width: {{ pct }}%;"></div>
    </div>
</div>
