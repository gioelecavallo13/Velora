{% comment %}CSS: .velora-search-box, .velora-search-box__label, .velora-search-box__input, .velora-search-box__submit, .velora-btn, .velora-btn--secondary{% endcomment %}
<form
    class="velora-search-box {{ extra_class }}"
    role="search"
    {% if action %}action="{{ action }}"{% endif %}
    method="{{ method }}">
    {% if label %}<label for="velora-search-{{ name }}" class="velora-search-box__label">{{ label }}</label>{% endif %}
    <input
        type="search"
        name="{{ name }}"
        id="velora-search-{{ name }}"
        class="velora-search-box__input"
        value="{{ value|default_if_none:'' }}"
        placeholder="{{ placeholder }}"
        autocomplete="off">
    <button type="submit" class="velora-search-box__submit velora-btn velora-btn--secondary">
        {{ submit_label }}
    </button>
</form>
