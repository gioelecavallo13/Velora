# Stack di SVILUPPO Velora UI.
# Avviare con: docker compose -f docker-compose.dev.yml up
# Prerequisito: la voce "127.0.0.1   velora.local" deve essere presente nel file hosts del sistema.
# Vedi docs/INFRASTRUCTURE.md per i dettagli.

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: velora-ui-web-dev:latest
    pull_policy: build
    container_name: velora-web-dev
    env_file:
      - .env
    environment:
      DJANGO_ENV: dev
    volumes:
      - .:/app
      - velora-pip-cache:/root/.cache/pip
    expose:
      - "8000"
    restart: unless-stopped

  assets:
    image: node:20-alpine
    container_name: velora-assets-dev
    working_dir: /app
    volumes:
      - .:/app
      - velora-node-modules:/app/node_modules
    # La logica multi-step (install + build one-shot + watch in parallelo) sta
    # in tools/start_assets.sh: piazzarla qui dentro un folded scalar YAML
    # rompe la semantica di `&` rispetto a `&&`. Vedi commenti nello script.
    command: sh tools/start_assets.sh
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: velora-nginx-dev
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # Servizio one-shot per i test di visual regression (M6).
  # Eseguire con:
  #   docker compose -f docker-compose.dev.yml run --rm playwright-tests
  # oppure per aggiornare le baseline:
  #   docker compose -f docker-compose.dev.yml run --rm playwright-tests \
  #     pytest tests/visual --update-snapshots
  playwright-tests:
    image: mcr.microsoft.com/playwright/python:v1.50.0-jammy
    container_name: velora-playwright-tests
    profiles: ["test"]
    working_dir: /app
    depends_on:
      - web
    volumes:
      - .:/app
      - velora-playwright-cache:/root/.cache/pip
    environment:
      VELORA_VISUAL_URL: http://web:8000
    # `--ignore-requires-python`: l'immagine Microsoft/Playwright python:v1.50.0
    # ha Python 3.10, mentre velora-ui dichiara `requires-python>=3.11`. Il
    # codice e` compatibile con 3.10, qui interessa solo poter installare il
    # pacchetto in editable per testare; il vincolo resta in pyproject.toml
    # per la pubblicazione futura. Quando passeremo a un'immagine playwright
    # con Python 3.11+ rimuoveremo il flag.
    command: >
      bash -lc "pip install --quiet --ignore-requires-python -e .[dev] && pytest tests/visual -v"

volumes:
  velora-pip-cache:
  velora-node-modules:
  velora-playwright-cache:
